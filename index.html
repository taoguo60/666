<!DOCTYPE html>
<html>
<body>

<h2>WebGL检测中...</h2>

<script>

function testWebGL(){

    let canvas = document.createElement("canvas");

    let gl = canvas.getContext("webgl") ||
              canvas.getContext("experimental-webgl");

    if(!gl){
        document.body.innerHTML =
        "<h1 style='color:red'>❌ WebGL完全不可用</h1>";
        return;
    }

    document.body.innerHTML =
    "<h1 style='color:green'>✅ WebGL可用</h1>";

}

testWebGL();

</script>

</body>
</html>
