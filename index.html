<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>原神级抽卡演出系统</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

#ui {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:white;
    z-index:10;
}

button {
    padding:12px 20px;
    font-size:16px;
    margin:5px;
}

#text {
    font-size:22px;
    margin-top:10px;
    text-shadow:0 0 10px white;
}
</style>
</head>

<body>

<div id="ui">
<h2>🔥 SSR原神级抽卡演出</h2>
<button onclick="pull()">抽卡</button>
<div id="text">点击开始召唤</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene, camera, renderer;
let model = null;
let flash = 0;

init();

function init(){

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth/window.innerHeight,
        0.1,
        1000
    );

    camera.position.set(0,1,6);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 光源
    let light = new THREE.PointLight(0xffffff,2,100);
    light.position.set(0,2,5);
    scene.add(light);

    animate();
}

// ===== 抽卡主流程 =====
function pull(){

    document.getElementById("text").innerHTML = "正在召唤中...";

    // 1️⃣ 镜头拉近（期待感）
    camera.position.z = 3;

    setTimeout(()=>{

        let r = Math.random()*100;

        if(r < 1){
            ssrEffect();
        } else if(r < 6){
            srEffect();
        } else {
            rEffect();
        }

    },1200);
}

// ===== SSR效果（核心爆点）=====
function ssrEffect(){

    document.getElementById("text").innerHTML =
        "🔥 SSR！！！神级降临！！！";

    // 镜头震动 + 慢动作
    let t = 0;

    let interval = setInterval(()=>{

        camera.position.x = Math.sin(t)*0.2;
        camera.position.y = Math.cos(t)*0.2;

        t += 0.4;

        if(t > 12){
            clearInterval(interval);
            camera.position.set(0,1,6);
        }

    },30);

    // 金色闪光
    flashScreen(0xffd700);

    // 模拟角色
    spawnModel("SSR角色");
}

// ===== SR效果 =====
function srEffect(){

    document.getElementById("text").innerHTML =
        "⭐ SR稀有角色";

    flashScreen(0x00ffcc);

    spawnModel("SR角色");
}

// ===== R效果 =====
function rEffect(){

    document.getElementById("text").innerHTML =
        "R普通角色";

    flashScreen(0x555555);

    spawnModel("R角色");
}

// ===== 模拟角色生成 =====
function spawnModel(name){

    if(model){
        scene.remove(model);
    }

    let geo = new THREE.BoxGeometry(1,2,1);
    let mat = new THREE.MeshBasicMaterial({
        color:0xffffff
    });

    model = new THREE.Mesh(geo,mat);
    scene.add(model);

    document.getElementById("text").innerHTML +=
        "｜获得：" + name;
}

// ===== 全屏闪光 =====
function flashScreen(color){

    let flashDiv = document.createElement("div");

    flashDiv.style.position = "absolute";
    flashDiv.style.top = 0;
    flashDiv.style.left = 0;
    flashDiv.style.width = "100%";
    flashDiv.style.height = "100%";
    flashDiv.style.background = "#" + color.toString(16);
    flashDiv.style.opacity = 0.8;
    flashDiv.style.zIndex = 5;

    document.body.appendChild(flashDiv);

    setTimeout(()=>{
        flashDiv.remove();
    },300);
}

// ===== 渲染 =====
function animate(){

    requestAnimationFrame(animate);

    if(model){
        model.rotation.y += 0.02;
    }

    renderer.render(scene,camera);
}

</script>

</body>
</html>
