<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SSR 3D角色抽卡</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#ui {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:white;
    z-index:10;
}

button {
    padding:12px 20px;
    margin:5px;
    font-size:16px;
}

#text {
    margin-top:10px;
    font-size:20px;
}
</style>
</head>

<body>

<div id="ui">
<h2>🔥 SSR角色抽卡系统</h2>
<button onclick="summon()">抽卡召唤</button>
<div id="text">准备召唤SSR角色</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene, camera, renderer;
let model = null;
let mixer;
let clock = new THREE.Clock();

init();

function init(){

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth/window.innerHeight,
        0.1,
        1000
    );

    camera.position.set(0,1,5);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 光源
    let light = new THREE.HemisphereLight(0xffffff,0x444444,2);
    scene.add(light);

    animate();
}

// ===== 加载模型 =====
function loadModel(url,color){

    if(model){
        scene.remove(model);
    }

    let loader = new THREE.GLTFLoader();

    loader.load(url,(gltf)=>{

        model = gltf.scene;
        model.scale.set(1.5,1.5,1.5);
        model.position.y = -1;

        scene.add(model);

        document.getElementById("text").innerHTML =
            "角色已召唤！";

    });
}

// ===== 抽卡召唤 =====
function summon(){

    let r = Math.random()*100;

    if(r < 1){
        document.getElementById("text").innerHTML = "🔥 SSR降临！！！";

        // 👉 这里放你的SSR模型
        loadModel("https://model-url/ssr.glb");

        cameraShake();

    } else if(r < 6){
        document.getElementById("text").innerHTML = "⭐ SR角色出现";

        loadModel("https://model-url/sr.glb");

    } else {
        document.getElementById("text").innerHTML = "R普通角色";

        loadModel("https://model-url/r.glb");
    }
}

// ===== 镜头震动（SSR特效）=====
function cameraShake(){

    let t = 0;
    let interval = setInterval(()=>{

        camera.position.x = Math.sin(t)*0.1;
        camera.position.y = Math.cos(t)*0.1;

        t += 0.5;

        if(t > 10){
            clearInterval(interval);
            camera.position.set(0,1,5);
        }

    },30);
}

// ===== 渲染循环 =====
function animate(){

    requestAnimationFrame(animate);

    let delta = clock.getDelta();

    if(model){
        model.rotation.y += 0.01;
    }

    renderer.render(scene,camera);
}

</script>

</body>
</html>
