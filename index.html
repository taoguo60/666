<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D抽卡演出系统</title>

<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:white;
    z-index:10;
}

button {
    padding:12px 20px;
    font-size:16px;
    margin:5px;
}

#text {
    font-size:20px;
    margin-top:10px;
}
</style>
</head>

<body>

<div id="ui">
<h2>✨ SSR抽卡演出系统</h2>
<button onclick="draw()">抽卡</button>
<div id="text">准备抽卡...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene, camera, renderer;
let card, light;
let animating = false;

init();

function init(){

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth/window.innerHeight,
        0.1,
        1000
    );

    camera.position.z = 5;

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // ===== 卡牌主体 =====
    let geometry = new THREE.PlaneGeometry(2,3);

    let material = new THREE.MeshBasicMaterial({
        color:0x333333,
        side:THREE.DoubleSide
    });

    card = new THREE.Mesh(geometry, material);
    scene.add(card);

    // ===== 光源 =====
    light = new THREE.PointLight(0xffffff,2,100);
    light.position.set(0,0,5);
    scene.add(light);

    animate();
}

function animate(){
    requestAnimationFrame(animate);

    if(animating){
        card.rotation.y += 0.15;
        card.scale.set(
            1 + Math.sin(Date.now()*0.01)*0.05,
            1 + Math.sin(Date.now()*0.01)*0.05,
            1
        );
    }

    renderer.render(scene, camera);
}

// ===== 抽卡演出 =====
function draw(){

    animating = true;

    document.getElementById("text").innerHTML = "抽卡中...";

    setTimeout(()=>{

        let r = Math.random()*100;

        if(r < 1){
            showSSR();
        }else if(r < 6){
            showSR();
        }else{
            showR();
        }

    },1500);
}

// ===== SSR演出 =====
function showSSR(){

    card.material.color.set(0xffd700);
    light.color.set(0xffd700);
    light.intensity = 5;

    document.getElementById("text").innerHTML =
        "🔥 SSR！神级角色降临！";
}

// ===== SR演出 =====
function showSR(){

    card.material.color.set(0x00ffcc);
    light.color.set(0x00ffcc);
    light.intensity = 3;

    document.getElementById("text").innerHTML =
        "⭐ SR稀有角色！";
}

// ===== R演出 =====
function showR(){

    card.material.color.set(0x555555);
    light.color.set(0x888888);
    light.intensity = 1;

    document.getElementById("text").innerHTML =
        "R普通角色";
}

</script>

</body>
</html>
